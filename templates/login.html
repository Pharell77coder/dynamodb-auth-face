<!DOCTYPE html>
<html>
<head>
    <title>Connexion</title>
    <style>
        .camera-container { margin: 10px 0; border: 2px solid #ccc; width: 320px; }
        #video { width: 320px; height: 240px; background: #000; }
    </style>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <h2>Connexion</h2>
    
    <form action="/login" method="POST">
        <input type="email" id="email" name="email" placeholder="Email" required><br>
        <input type="password" name="password" placeholder="Mot de passe"><br>
        <button type="submit">Connexion Standard</button>
    </form>

    <hr>

    <h3>Ou Authentification Faciale</h3>
    <div class="camera-container">
        <video id="video" autoplay></video>
    </div>
    <button onclick="loginWithFace()">Scanner mon visage</button>
    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');

        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => { video.srcObject = stream; });

        async function loginWithFace() {
            const email = document.getElementById('email').value;
            if(!email) { alert("Entrez votre email d'abord"); return; }

            const context = canvas.getContext('2d');
            context.drawImage(video, 0, 0, 320, 240);
            const imageData = canvas.toDataURL('image/jpeg');

            const response = await fetch('/login/face', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, image: imageData })
            });

            const result = await response.json();
            if(result.status === "success") {
                window.location.href = "/index";
            } else {
                alert("Erreur : " + result.message);
            }
        }
    </script>
</body>
</html>
